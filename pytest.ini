[pytest]
# Lets `pytest` run without exporting PYTHONPATH=src (env var still works too).
pythonpath = src
testpaths = tests
markers =
    live: hits a real connector; auto-skips offline (v1 pattern). Run with access to drift-guard.
    invariant: an immunity-spec guard (CLAUDE.md §5 / VERIFICATION.md). Gates every milestone.
    golden: known-answer reconciliation against tests/golden/.
    slow: long-running (backtests); excluded from the fast inner loop.
